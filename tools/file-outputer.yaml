identity:
  name: "file-outputer"
  author: "mikoto2000"
  label:
    en_US: "file-outputer"
    zh_Hans: "file-outputer"
    pt_BR: "file-outputer"
    ja_JP: "file-outputer"
description:
  human:
    en_US: "Provide file output."
    zh_Hans: "Provide file output."
    pt_BR: "Provide file output."
    ja_JP: "Provide file output."
  llm: "Provide file output."
parameters:
  - name: content_base64
    type: string
    required: true
    label:
      en_US: Base64 content
      ja_JP: Base64 エンコード済みデータ
    human_description:
      en_US: Base64-encoded binary content.
      ja_JP: Base64 エンコードされたバイナリ内容です。
    llm_description: Base64 encoded binary data.
    form: llm

  - name: output_filename
    type: string
    required: true
    label:
      en_US: Output filename
      ja_JP: 出力ファイル名
    human_description:
      en_US: Output filename.
      ja_JP: 出力ファイル名です。
    llm_description: Output filename, for example result.xlsx, result.pdf, result.zip.
    form: llm

  - name: mime_type
    type: string
    required: false
    label:
      en_US: MIME type
      ja_JP: MIME type
    human_description:
      en_US: MIME type of the output file.
      ja_JP: 出力ファイルの MIME type です。
    llm_description: MIME type, for example application/pdf or application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.
    form: llm

extra:
  python:
    source: tools/file-outputer.py
